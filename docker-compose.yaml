services:
  sheet-processor:
    build:
      context: .
      args:
        USERNAME: ${USERNAME}
    container_name: bc_sheet_processor
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/home/${USERNAME}/uploads
      - ./output:/home/${USERNAME}/output
      - ./templates:/home/${USERNAME}/templates
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=${REDIS_URL}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
