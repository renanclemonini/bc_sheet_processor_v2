<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processador de Excel - BotConversa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="/img/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/templates/design-tokens.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #FFFFFF;
            background-image:
                radial-gradient(ellipse at 85% 10%, rgba(106,150,218,0.45) 0%, transparent 60%),
                radial-gradient(ellipse at 10% 85%, rgba(135,204,121,0.40) 0%, transparent 55%),
                radial-gradient(ellipse at 5% 5%, rgba(135,204,121,0.25) 0%, transparent 45%);
            background-attachment: fixed;
            font-family: var(--font-family-base);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-5);
        }
        .container {
            background: var(--bg-surface-raised);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-sm);
            max-width: 600px; width: 100%;
            padding: var(--space-8);
            transition: box-shadow var(--duration-base) var(--ease-default);
        }
        .container:hover { box-shadow: var(--shadow-md); }
        .brand-head { display: flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-4); }
        .brand-icon { width: 28px; height: 28px; flex-shrink: 0; }
        .brand-name { font-weight: var(--font-weight-semibold); font-size: var(--text-sm); color: var(--color-brand-blue-500); letter-spacing: var(--tracking-wide); text-transform: uppercase; }
        h1 { color: var(--text-heading); margin-bottom: var(--space-1); font-size: var(--text-3xl); line-height: var(--leading-tight); font-weight: var(--font-weight-bold); }
        .subtitle { color: var(--text-secondary); margin-bottom: var(--space-6); font-size: var(--text-base); line-height: var(--leading-normal); font-weight: var(--font-weight-regular); }
        .upload-area { border: 2px dashed var(--color-blue-400); border-radius: var(--radius-lg); padding: var(--space-10); text-align: center; margin-bottom: var(--space-5); cursor: pointer; transition: background var(--duration-base) var(--ease-default), border-color var(--duration-base) var(--ease-default); }
        .upload-area:hover { background: var(--color-blue-50); border-color: var(--color-blue-500); }
        .upload-area.dragover { background: var(--color-blue-100); border-color: var(--color-blue-500); }
        input[type="file"] { display: none; }
        .upload-icon { font-size: 48px; margin-bottom: 10px; }
        .file-name { color: var(--color-blue-500); font-weight: var(--font-weight-semibold); margin: var(--space-1) 0; font-size: var(--text-sm); }
        .btn { background: var(--gradient-primary); border: none; color: var(--text-inverse); font-family: var(--font-family-base); font-size: var(--text-base); font-weight: var(--font-weight-semibold); padding: var(--space-3) var(--space-6); border-radius: var(--radius-lg); cursor: pointer; transition: transform var(--duration-base) var(--ease-spring), box-shadow var(--duration-base) var(--ease-default); }
        .btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-blue); }
        .btn:not(:disabled):active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-full { width: 100%; }
        .btn-inline { display: inline-block; padding: var(--space-2) var(--space-5); }
        .progress-block { display: none; margin-top: var(--space-5); }
        .progress-bar { height: 30px; background: var(--color-neutral-200); border-radius: var(--radius-md); overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--gradient-primary); transition: width var(--duration-slow) var(--ease-default); display: flex; align-items: center; justify-content: center; color: var(--text-inverse); font-weight: var(--font-weight-semibold); font-size: var(--text-xs); }
        .status-message { text-align: center; margin-top: var(--space-3); color: var(--text-muted); font-size: var(--text-sm); }
        .result-container { display: none; margin-top: var(--space-5); background: var(--color-success-bg); border: 1px solid var(--color-green-100); border-radius: var(--radius-lg); padding: var(--space-5); }
        .result-title { color: var(--text-heading); font-size: var(--text-lg); font-weight: var(--font-weight-semibold); margin-bottom: var(--space-3); }
        .result-item { display: flex; justify-content: space-between; padding: var(--space-2) 0; border-bottom: 1px solid var(--color-green-100); }
        .result-item:last-of-type { border-bottom: none; }
        .result-item span { color: var(--text-secondary); }
        .result-item strong { color: var(--text-primary); font-weight: var(--font-weight-semibold); }
        .result-auto { margin-top: var(--space-3); color: var(--text-brand); font-weight: var(--font-weight-semibold); text-align: center; font-size: var(--text-sm); }
        .error-container { display: none; margin-top: var(--space-5); background: var(--color-error-bg); border: 1px solid var(--color-error); border-radius: var(--radius-lg); padding: var(--space-4); color: var(--color-error); font-size: var(--text-base); line-height: var(--leading-normal); }
        .error-container .btn { margin-top: var(--space-2); }
        .coldstart-container { display: none; margin-top: var(--space-5); background: var(--color-warning-bg); border: 1px solid var(--color-warning); border-radius: var(--radius-lg); padding: var(--space-4); color: #92400e; text-align: center; font-size: var(--text-sm); line-height: var(--leading-normal); }
        .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid var(--color-warning); border-top-color: transparent; border-right-color: var(--color-warning); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @-webkit-keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 640px) { body { padding: var(--space-2); } .container { padding: var(--space-5); } h1 { font-size: var(--text-2xl); } .upload-area { padding: var(--space-5); } }
    </style>
</head>

<body>
    <div class="container">
        <div class="brand-head">
            <svg class="brand-icon" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="8" y="8" width="104" height="104" rx="24" fill="var(--color-brand-blue-500)"/>
                <g transform="translate(60, 52)">
                    <path d="M-28-20 L28-20 C33.5-20 38-15.5 38-10 L38 20 C38 25.5 33.5 30 28 30 L4 30 L-12 46 L-12 30 L-28 30 C-33.5 30-38 25.5-38 20 L-38-10 C-38-15.5-33.5-20-28-20Z" fill="white" fill-opacity="0.15"/>
                    <circle cx="-14" cy="5" r="3.5" fill="white"/>
                    <circle cx="0" cy="5" r="3.5" fill="white"/>
                    <circle cx="14" cy="5" r="3.5" fill="white"/>
                </g>
            </svg>
            <span class="brand-name">BotConversa</span>
        </div>
        <h1>📊 Ajuste sua Planilha</h1>
        <p class="subtitle">Ajuste sua planilha para o padrão correto de importação no BotConversa</p>

        <form id="uploadForm">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <p>Clique ou arraste seu arquivo Excel aqui</p>
                <p style="font-size: 12px; color: #999; margin-top: 5px;">Formatos aceitos: .xlsx, .xls</p>
                <input type="file" id="fileInput" accept=".xlsx,.xls" required>
            </div>

            <div class="file-name" id="fileNameDisplay"></div>

            <button type="submit" id="submitBtn" class="btn btn-full">Processar Arquivo</button>
        </form>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>
            <div class="status-message" id="statusMessage">Processando...</div>
        </div>

        <div class="result-container" id="resultContainer">
            <h3 class="result-title">✓ Processamento Concluído!</h3>
            <div id="resultDetails"></div>
            <p class="result-auto">
                ⬇️ Download iniciado automaticamente...
            </p>
        </div>

        <div class="error-container" id="errorContainer"></div>

        <div class="coldstart-container" id="coldstartContainer">
            <span class="spinner"></span>
            <span id="coldstartText">Servidor iniciando...</span>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileNameDisplay');
        const form = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const statusMessage = document.getElementById('statusMessage');
        const resultContainer = document.getElementById('resultContainer');
        const resultDetails = document.getElementById('resultDetails');
        const errorContainer = document.getElementById('errorContainer');
        const coldstartContainer = document.getElementById('coldstartContainer');
        const coldstartText = document.getElementById('coldstartText');

        let currentJobId = null;

        // Upload area click
        uploadArea.addEventListener('click', () => fileInput.click());

        // File selection
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileName.textContent = `Arquivo selecionado: ${e.target.files[0].name}`;
                form.requestSubmit();
            }
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            fileInput.files = e.dataTransfer.files;
            if (fileInput.files.length > 0) {
                fileName.textContent = `Arquivo selecionado: ${fileInput.files[0].name}`;
                form.requestSubmit();
            }
        });

        async function safeFetchJson(url, options = {}) {
            let response;
            try {
                response = await fetch(url, options);
            } catch {
                throw { type: 'network', message: 'Servidor indisponível. Verifique sua conexão.' };
            }

            const text = await response.text();

            if (!response.ok) {
                let detail;
                try { detail = JSON.parse(text).detail; } catch {}
                throw { type: 'http', message: detail || `Erro ${response.status}`, status: response.status };
            }

            try {
                return JSON.parse(text);
            } catch {
                if (text.includes('Not Found') || text.includes('not found')) {
                    throw { type: 'coldstart', message: 'Servidor iniciando...' };
                }
                throw { type: 'parse', message: 'Resposta inesperada do servidor.' };
            }
        }

        function showColdStart(tentativa, maxTentativas) {
            coldstartText.textContent = `Servidor iniciando... Tentativa ${tentativa}/${maxTentativas}`;
            coldstartContainer.style.display = 'block';
            progressContainer.style.display = 'block';
            progressFill.style.width = '0%';
            progressFill.textContent = '0%';
            statusMessage.textContent = `Aguardando servidor (${tentativa}/${maxTentativas})...`;
        }

        function hideColdStart() {
            coldstartContainer.style.display = 'none';
        }

        // Form submit with retry
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const file = fileInput.files[0];
            if (!file) return;

            errorContainer.style.display = 'none';
            resultContainer.style.display = 'none';
            submitBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', file);

            const MAX_RETRIES = 4;
            let tentativa = 0;

            while (tentativa < MAX_RETRIES) {
                tentativa++;
                showColdStart(tentativa, MAX_RETRIES);

                try {
                    const data = await safeFetchJson('/upload', {
                        method: 'POST',
                        body: formData
                    });

                    hideColdStart();
                    currentJobId = data.job_id;
                    progressFill.style.width = '10%';
                    progressFill.textContent = '10%';
                    statusMessage.textContent = 'Processando arquivo...';
                    pollStatus(currentJobId);
                    return;

                } catch (error) {
                    if (error.type === 'coldstart' && tentativa < MAX_RETRIES) {
                        await new Promise(r => setTimeout(r, 3000));
                        continue;
                    }
                    hideColdStart();
                    progressContainer.style.display = 'none';
                    submitBtn.disabled = false;
                    showError(error.message || 'Erro ao enviar arquivo', () => {
                        form.requestSubmit();
                    });
                    return;
                }
            }

            hideColdStart();
            progressContainer.style.display = 'none';
            submitBtn.disabled = false;
            showError('Servidor não respondeu após várias tentativas. Recarregue a página e tente novamente.', () => {
                location.reload();
            });
        });

        // Poll status
        async function pollStatus(jobId) {
            try {
                const data = await safeFetchJson(`/status/${jobId}`);

                if (data.status === 'processing') {
                    const progress = data.progresso || 0;
                    progressFill.style.width = `${progress}%`;
                    progressFill.textContent = `${progress}%`;
                    statusMessage.textContent = `Processando... ${progress}%`;
                    setTimeout(() => pollStatus(jobId), 500);

                } else if (data.status === 'completed') {
                    progressFill.style.width = '100%';
                    progressFill.textContent = '100%';
                    statusMessage.textContent = 'Concluído!';

                    setTimeout(() => {
                        progressContainer.style.display = 'none';
                        showResults(data);
                        downloadFile(jobId);
                    }, 500);

                } else if (data.status === 'error') {
                    throw { type: 'http', message: data.error || 'Erro no processamento' };
                }

            } catch (error) {
                progressContainer.style.display = 'none';
                submitBtn.disabled = false;
                showError(error.message || 'Erro ao verificar status');
            }
        }

        // Show results
        function showResults(data) {
            const resultado = data.resultado;

            resultDetails.innerHTML = `
                <div class="result-item">
                    <span>Linhas originais:</span>
                    <strong>${resultado.linhas_originais}</strong>
                </div>
                <div class="result-item">
                    <span>Linhas processadas:</span>
                    <strong>${resultado.linhas_novo}</strong>
                </div>
                <div class="result-item">
                    <span>Colunas originais:</span>
                    <strong>${resultado.colunas_originais}</strong>
                </div>
                <div class="result-item">
                    <span>Linhas em branco removidas:</span>
                    <strong>${resultado.linhas_em_branco}</strong>
                </div>
            `;

            resultContainer.style.display = 'block';
            submitBtn.disabled = false;
        }

        // Download automático
        function downloadFile(jobId) {
            const link = document.createElement("a");
            link.href = `/download/${jobId}`;
            link.download = "";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Show error with optional retry button
        function showError(message, onRetry) {
            errorContainer.innerHTML = `❌ Erro: ${message}`;
            if (onRetry) {
                const btn = document.createElement('button');
                btn.className = 'btn btn-inline';
                btn.textContent = 'Tentar novamente';
                btn.onclick = onRetry;
                errorContainer.appendChild(btn);
            }
            errorContainer.style.display = 'block';
        }
    </script>
</body>

</html>
